<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wandering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="paper">
    <header class="masthead">
      <div class="vol">VOL. I &middot; NO. 000</div>
      <h1 class="title">The Wandering</h1>
      <div class="subtitle">a random route generator</div>
      <div class="est">EST. TODAY</div>
      <div class="date" id="date">&nbsp;</div>
      <div class="rule"></div>
    </header>

    <section class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>STEP ONE &middot; STARTING POINT</span>
      </div>
      <button id="locate" class="line-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="9"/>
        </svg>
        <span id="locate-label">Find my location</span>
      </button>
      <div id="location-status"></div>
    </section>

    <section class="card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>STEP TWO &middot; DURATION</span>
      </div>
      <div class="duration-display">
        <span class="duration-number" id="min-display">30</span>
        <span class="duration-unit">MINUTES</span>
      </div>
      <input type="range" id="minutes" min="10" max="120" step="5" value="30" class="slider">
      <div class="slider-bounds">
        <span>10m</span>
        <span>120m</span>
      </div>
    </section>

    <label class="manhattan-toggle">
      <input type="checkbox" id="manhattan-only">
      <span>Constrain to Manhattan</span>
    </label>

    <button id="generate" class="generate-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l9-9 9 9-9 9z" opacity=".3"/>
        <path d="M12 3v18M3 12h18"/>
      </svg>
      <span id="generate-label">Generate route</span>
    </button>

    <section class="card map-card" id="map-card" hidden>
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        <span>YOUR WALK</span>
      </div>
      <div id="map"></div>
      <div id="summary"></div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
